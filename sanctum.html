<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Système Sanctum — Fyrentis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0d0b09;
      --surface:   #151210;
      --surface-2: #1c1815;
      --border:    #2e2820;
      --text:      #d4c9b8;
      --muted:     #7a6f60;
      --faint:     #3d342a;
      --gold:      #c8a028;
      --gold-dim:  #8a6b18;
      --red:       #8b1c1c;
      --red-bright:#c43030;
      --blue:      #2255aa;
      --blue-bright:#4488dd;
      --green:     #2a6b30;
      --green-bright:#55aa66;
      --orange:    #c85a1a;
      --orange-bright:#e07030;
      --purple:    #7a5c9e;
      --teal:      #1a5f5f;
      --teal-bright:#33aaaa;
    }
    html { font-family: 'Crimson Text', Georgia, serif; background: var(--bg); color: var(--text); height: 100%; }
    body { min-height: 100dvh; display: flex; flex-direction: column; }

    /* NAV */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; gap: 1rem; }
    .nav-title { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.05em; white-space: nowrap; }
    .nav-links { display: flex; gap: 1.25rem; list-style: none; flex-wrap: wrap; }
    .nav-links a { font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }

    /* LAYOUT */
    .page-layout { display: grid; grid-template-columns: 1fr 340px; flex: 1; overflow: hidden; height: calc(100dvh - 49px); }
    @media (max-width: 960px) { .page-layout { grid-template-columns: 1fr; height: auto; overflow: visible; } }

    /* ORRERY ZONE */
    .orrery-zone { position: relative; overflow: hidden; background: radial-gradient(ellipse at 50% 50%, #10100a 0%, #0d0b09 80%); display: flex; flex-direction: column; }
    .orrery-zone::before { content:''; position:absolute; inset:0; background-image: radial-gradient(circle, rgba(255,255,200,0.12) 1px, transparent 1px); background-size: 35px 35px; opacity: 0.12; pointer-events: none; }

    .orrery-header { padding: 1.2rem 1.5rem 0.5rem; position: relative; z-index: 1; }
    .orrery-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold); letter-spacing: 0.1em; }
    .orrery-subtitle { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; }

    #orrery-svg { width: 100%; flex: 1; cursor: default; }

    /* Orbits */
    .orbit-ring { fill: none; stroke: var(--faint); stroke-width: 0.8; stroke-dasharray: 4 6; opacity: 0.5; }
    .warp-path { fill: none; stroke: var(--purple); stroke-width: 1.5; stroke-dasharray: 6 5; opacity: 0.55; }
    @keyframes warp-pulse { 0%,100%{stroke-dashoffset:0;} 100%{stroke-dashoffset:-44;} }
    .warp-path { animation: warp-pulse 4s linear infinite; }

    /* Planet groups */
    .planet-group { cursor: pointer; }
    .planet-group:focus { outline: none; }
    .planet-bg { transition: filter 0.25s, r 0.25s; }
    .planet-group:hover .planet-bg, .planet-group:focus .planet-bg { filter: brightness(1.35); }
    .planet-group.selected .planet-bg { filter: drop-shadow(0 0 6px currentColor) brightness(1.4); }
    .planet-label { font-family: 'Cinzel', serif; font-size: 8px; fill: var(--text); pointer-events: none; }
    .planet-sublabel { font-size: 7px; fill: var(--muted); pointer-events: none; font-family: 'Crimson Text', serif; font-style: italic; }

    /* Bastion / station markers */
    .marker-group { cursor: pointer; }
    .marker-group:hover polygon, .marker-group:hover rect { opacity: 0.9; }

    /* Danger pips */
    @keyframes danger-blink { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
    .danger-4 .planet-bg { animation: danger-blink 1.8s ease-in-out infinite; }

    /* SIDEBAR */
    .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-top { padding: 1.25rem 1.25rem 0.75rem; border-bottom: 1px solid var(--border); }
    .sidebar-top h2 { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--gold); margin-bottom: 0.2rem; }
    .sidebar-top p { font-size: 0.8rem; color: var(--muted); line-height: 1.4; }

    .planet-detail { padding: 1.25rem; display: none; }
    .planet-detail.active { display: block; }
    .pd-eyebrow { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.3rem; }
    .pd-name { font-family: 'Cinzel', serif; font-size: 1.35rem; color: var(--gold); line-height: 1.15; margin-bottom: 0.2rem; }
    .pd-type { font-size: 0.82rem; color: var(--muted); font-style: italic; margin-bottom: 0.75rem; }
    .pd-status { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; padding: 0.2rem 0.65rem; border-radius: 999px; margin-bottom: 1rem; font-family: 'Cinzel', serif; letter-spacing: 0.04em; }
    .pd-status.imp { background: rgba(26,58,107,0.3); color: var(--blue-bright); border: 1px solid var(--blue); }
    .pd-status.mech { background: rgba(26,95,95,0.3); color: var(--teal-bright); border: 1px solid var(--teal); }
    .pd-status.contested { background: rgba(139,28,28,0.25); color: var(--red-bright); border: 1px solid var(--red); }
    .pd-desc { font-size: 0.88rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
    .pd-section { margin-bottom: 0.85rem; }
    .pd-section h4 { font-family: 'Cinzel', serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold-dim); margin-bottom: 0.4rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid var(--border); color: var(--text); background: var(--surface-2); }
    .tag.gold { border-color: var(--gold-dim); color: var(--gold); background: rgba(200,160,40,0.08); }
    .tag.red { border-color: var(--red); color: var(--red-bright); background: rgba(139,28,28,0.12); }
    .tag.teal { border-color: var(--teal); color: var(--teal-bright); background: rgba(26,95,95,0.12); }
    .tag.blue { border-color: var(--blue); color: var(--blue-bright); background: rgba(34,85,170,0.12); }
    .tag.green { border-color: var(--green); color: var(--green-bright); background: rgba(42,107,48,0.12); }
    .danger-bar { display: flex; gap: 3px; margin-top: 0.5rem; }
    .danger-pip { width: 14px; height: 6px; border-radius: 2px; background: var(--faint); }
    .danger-pip.on { background: var(--red-bright); }

    /* BASTIONS SECTION */
    .bastions-section { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
    .bastions-section h3 { font-family: 'Cinzel', serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold-dim); margin-bottom: 0.7rem; }
    .bastion-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .bastion-card { padding: 0.6rem 0.75rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; }
    .bastion-name { font-family: 'Cinzel', serif; font-size: 0.78rem; color: var(--text); margin-bottom: 0.15rem; }
    .bastion-status { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 999px; display: inline-block; margin-bottom: 0.3rem; }
    .status--ok { background: rgba(42,107,48,0.2); color: var(--green-bright); border: 1px solid var(--green); }
    .status--warn { background: rgba(200,90,26,0.2); color: var(--orange-bright); border: 1px solid var(--orange); }
    .bastion-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.45; }

    /* WARP ALERT */
    .warp-alert { margin: 0.75rem 1.25rem 1rem; padding: 0.65rem 0.85rem; background: rgba(122,92,158,0.12); border: 1px solid rgba(122,92,158,0.4); border-radius: 4px; }
    .warp-alert-title { font-family: 'Cinzel', serif; font-size: 0.72rem; color: #a080cc; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.3rem; }
    .warp-alert-text { font-size: 0.78rem; color: var(--muted); line-height: 1.45; }

    /* PERSONNAGES */
    .figures-section { padding: 0.75rem 1.25rem 1.25rem; border-top: 1px solid var(--border); }
    .figures-section h3 { font-family: 'Cinzel', serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold-dim); margin-bottom: 0.6rem; }
    .figure-item { display: flex; gap: 0.6rem; align-items: flex-start; margin-bottom: 0.45rem; }
    .figure-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0; }
    .figure-info p { font-size: 0.8rem; color: var(--text); line-height: 1.3; }
    .figure-info span { font-size: 0.72rem; color: var(--muted); }

    /* EMPTY STATE */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; color: var(--muted); gap: 0.6rem; }
    .empty-state-icon { font-size: 2rem; opacity: 0.35; }
    .empty-state p { font-size: 0.83rem; line-height: 1.5; }
  </style>
</head>
<body>

<nav>
  <span class="nav-title">⚙ Système Sanctum</span>
  <ul class="nav-links">
    <li><a href="index.html">Campagne</a></li>
    <li><a href="carte.html">Carte</a></li>
  </ul>
</nav>

<div class="page-layout">

  <!-- ORRERY -->
  <div class="orrery-zone">
    <div class="orrery-header">
      <div class="orrery-title" id="star-name">Chargement…</div>
      <div class="orrery-subtitle" id="star-type"></div>
    </div>
    <svg id="orrery-svg" viewBox="0 0 700 560" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Orrerie du système Sanctum">
      <defs>
        <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe87a" stop-opacity="1"/>
          <stop offset="40%" stop-color="#f0a820" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#c87010" stop-opacity="0"/>
        </radialGradient>
        <filter id="planet-glow">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Dynamically injected by JS -->
    </svg>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <h2 id="sb-title">Système Sanctum</h2>
      <p id="sb-sub">Sélectionne un monde pour afficher ses données de reconnaissance.</p>
    </div>

    <!-- DETAIL ZONE (injecté par JS) -->
    <div id="detail-zone">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">◈</div>
        <p>Sélectionne un monde sur la carte pour afficher les données de reconnaissance.</p>
      </div>
    </div>

    <!-- BASTIONS (injecté par JS) -->
    <div class="bastions-section" id="bastions-section" style="display:none">
      <h3>Fortifications du Système</h3>
      <div class="bastion-list" id="bastion-list"></div>
    </div>

    <!-- WARP ALERT (injecté par JS) -->
    <div id="warp-alert-zone"></div>

    <!-- PERSONNAGES (injecté par JS) -->
    <div class="figures-section" id="figures-section" style="display:none">
      <h3>Personnages Clés</h3>
      <div id="figures-list"></div>
    </div>
  </aside>
</div>

<script>
(function () {

  const FACTION_ICONS = {
    'Mechanicus': '⚙', 'Black Templars': '✠', 'Inquisition': '☩',
    'Blood Angels': '🩸', 'Garde Impériale': '⚔', 'default': '★'
  };
  const FACTION_CLASSES = {
    'Mechanicus': 'teal', 'Black Templars': 'gold', 'Inquisition': 'blue', 'default': ''
  };

  function statusClass(status) {
    if (!status) return 'imp';
    const s = status.toLowerCase();
    if (s.includes('mechanicus')) return 'mech';
    if (s.includes('chaos') || s.includes('contesté')) return 'contested';
    return 'imp';
  }

  function dangerPips(level) {
    let h = '<div class="danger-bar">';
    for (let i = 1; i <= 5; i++) h += `<div class="danger-pip${i <= level ? ' on' : ''}"></div>`;
    return h + '</div>';
  }

  // Orbital positions : cx/cy autour du centre (350,285)
  const CX = 350, CY = 280;
  const RADII = [70, 120, 185, 255, 330];
  const ANGLES = [-90, 45, 160, -30, 110]; // en degrés

  function polar(r, angleDeg) {
    const a = angleDeg * Math.PI / 180;
    return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
  }

  function buildOrrery(data) {
    const svg = document.getElementById('orrery-svg');
    let html = '';

    // Chemin warp
    html += `<path class="warp-path" d="M ${CX-300} ${CY+180} Q ${CX} ${CY-220} ${CX+320} ${CY+80}" />`;
    html += `<text x="${CX-180}" y="${CY+195}" font-size="7" fill="#7a5c9e" font-family="Crimson Text,serif" font-style="italic" opacity="0.7">Chemin warp naissant</text>`;

    // Orbites
    data.planets.forEach((_, i) => {
      html += `<circle class="orbit-ring" cx="${CX}" cy="${CY}" r="${RADII[i]}"/>`;
    });

    // Étoile
    html += `<circle cx="${CX}" cy="${CY}" r="38" fill="url(#star-glow)" opacity="0.5"/>`;
    html += `<circle cx="${CX}" cy="${CY}" r="20" fill="#ffe87a" filter="url(#planet-glow)"/>`;
    html += `<text x="${CX}" y="${CY+34}" text-anchor="middle" font-family="Cinzel,serif" font-size="7.5" fill="#c8a028" letter-spacing="0.05em">${data.star.name}</text>`;

    // Planètes
    data.planets.forEach((p, i) => {
      const pos = polar(RADII[i], ANGLES[i]);
      const r = i === 2 ? 12 : i >= 3 ? 8 : 10; // gas giant bigger
      const dangerCls = p.danger_level >= 4 ? ' danger-4' : '';
      html += `
        <g class="planet-group${dangerCls}" data-pid="${p.id}" tabindex="0" role="button" aria-label="${p.name}">
          <circle cx="${pos.x}" cy="${pos.y}" r="${r+8}" fill="${p.color_hex}" opacity="0.08"/>
          <circle class="planet-bg" cx="${pos.x}" cy="${pos.y}" r="${r}" fill="${p.color_hex}" stroke="${p.color_hex}" stroke-width="0.8" filter="url(#planet-glow)"/>
          <text class="planet-label" x="${pos.x}" y="${pos.y + r + 11}" text-anchor="middle">${p.name}</text>
          <text class="planet-sublabel" x="${pos.x}" y="${pos.y + r + 20}" text-anchor="middle">${p.type.split('—')[0].trim()}</text>
        </g>`;

      // Lune Brokha sur Sanctum
      if (p.id === 1) {
        html += `
          <g class="planet-group" data-pid="brokha" tabindex="0" role="button" aria-label="Lune Brokha">
            <circle cx="${pos.x+18}" cy="${pos.y-14}" r="5" fill="#aaaaaa" opacity="0.8" filter="url(#planet-glow)"/>
            <text class="planet-sublabel" x="${pos.x+18}" y="${pos.y-5}" text-anchor="middle">Brokha</text>
          </g>`;
      }
    });

    // Bastions (hexagones)
    const b1 = polar(RADII[0] - 30, 60);
    const b2 = polar(RADII[1] + 30, 200);
    [b1, b2].forEach((bp, i) => {
      const label = i === 0 ? 'B.Alpha' : 'B.Beta';
      const col = i === 0 ? '#c8a028' : '#c85a1a';
      html += `
        <g class="marker-group" data-pid="bastion${i+1}" tabindex="0" role="button" aria-label="Bastion ${i===0?'Alpha':'Beta'}">
          <polygon points="${bp.x},${bp.y-7} ${bp.x+6},${bp.y-3} ${bp.x+6},${bp.y+3} ${bp.x},${bp.y+7} ${bp.x-6},${bp.y+3} ${bp.x-6},${bp.y-3}" fill="${col}" opacity="0.25" stroke="${col}" stroke-width="0.8"/>
          <text x="${bp.x}" y="${bp.y+18}" text-anchor="middle" font-family="Cinzel,serif" font-size="7" fill="${col}">${label}</text>
        </g>`;
    });

    svg.insertAdjacentHTML('beforeend', html);
  }

  function showDetail(data, pid) {
    // Déselectionne tous, sélectionne le cliqué
    document.querySelectorAll('.planet-group, .marker-group').forEach(g => g.classList.remove('selected'));
    document.querySelectorAll('[data-pid="' + pid + '"]').forEach(g => g.classList.add('selected'));

    const zone = document.getElementById('detail-zone');

    let html = '';
    if (pid === 'brokha') {
      html = `<div class="planet-detail active">
        <p class="pd-eyebrow">Lune de Sanctum</p>
        <h3 class="pd-name">Brokha</h3>
        <p class="pd-type">Lune — Bastion Chapitral</p>
        <span class="pd-status gold" style="background:rgba(200,160,40,0.1);color:var(--gold);border:1px solid var(--gold-dim)">✠ Black Templars</span>
        <p class="pd-desc">Forteresse stellaire lourde implantée sur la lune Brokha. Siège de la présence des Black Templars dans le système et quartier général de la Croisade Fyrentis. Le Sénéchal Manfred y commande l'ensemble des forces alliées du sous-secteur.</p>
        <div class="pd-section"><h4>Installations</h4><div class="tags"><span class="tag gold">✠ QG Croisade</span><span class="tag">Forteresse stellaire lourde</span><span class="tag">Garnison Astartes</span></div></div>
      </div>`;
    } else if (pid.startsWith('bastion')) {
      const idx = parseInt(pid.replace('bastion','')) - 1;
      const b = data.bastions[idx];
      if (b) {
        html = `<div class="planet-detail active">
          <p class="pd-eyebrow">Fortification Orbitale</p>
          <h3 class="pd-name">${b.name}</h3>
          <p class="pd-type">${b.type}</p>
          <span class="pd-status ${b.status_class === 'status--ok' ? 'imp' : 'contested'}">${b.status}</span>
          <p class="pd-desc">${b.description}</p>
        </div>`;
      }
    } else {
      const p = data.planets.find(pl => pl.id === parseInt(pid));
      if (p) {
        const scls = statusClass(p.imperial_status);
        const featuresHTML = p.notable_features.map(f => `<span class="tag">${f}</span>`).join('');
        html = `<div class="planet-detail active">
          <p class="pd-eyebrow">Corps Céleste — Orbite ${p.orbital_position}</p>
          <h3 class="pd-name">${p.name}</h3>
          <p class="pd-type">${p.type} &mdash; ${p.orbital_distance_au} UA</p>
          <span class="pd-status ${scls}">${p.imperial_status}</span>
          <p class="pd-desc">${p.description}</p>
          <div class="pd-section"><h4>Caractéristiques</h4><div class="tags">${featuresHTML}</div></div>
          <div class="pd-section"><h4>Niveau de danger</h4>${dangerPips(p.danger_level)}</div>
        </div>`;
      }
    }

    // Toujours écraser le contenu de la zone — qu'il y ait déjà un détail ou l'empty-state
    zone.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">◈</div><p>Aucune donnée disponible.</p></div>';
  }

  function bindClicks(data) {
    document.querySelectorAll('.planet-group, .marker-group').forEach(g => {
      g.addEventListener('click', () => showDetail(data, g.dataset.pid));
      g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showDetail(data, g.dataset.pid); } });
    });
  }

  function renderBastions(bastions) {
    if (!bastions || !bastions.length) return;
    document.getElementById('bastions-section').style.display = '';
    document.getElementById('bastion-list').innerHTML = bastions.map(b =>
      `<div class="bastion-card">
        <div class="bastion-name">${b.name}</div>
        <span class="bastion-status ${b.status_class}">${b.status}</span>
        <p class="bastion-desc">${b.description}</p>
      </div>`
    ).join('');
  }

  function renderWarpAlert(warp) {
    if (!warp) return;
    document.getElementById('warp-alert-zone').innerHTML =
      `<div class="warp-alert">
        <div class="warp-alert-title">⚠ ${warp.name} — ${warp.status}</div>
        <p class="warp-alert-text">${warp.description}</p>
      </div>`;
  }

  function renderFigures(figures) {
    if (!figures || !figures.length) return;
    document.getElementById('figures-section').style.display = '';
    document.getElementById('figures-list').innerHTML = figures.map(f => {
      const icon = FACTION_ICONS[f.faction] || FACTION_ICONS.default;
      const cls  = FACTION_CLASSES[f.faction] || FACTION_CLASSES.default;
      return `<div class="figure-item">
        <div class="figure-icon">${icon}</div>
        <div class="figure-info"><p>${f.nom}</p><span>${f.role}</span></div>
      </div>`;
    }).join('');
  }

  // MAIN
  fetch('assets/data/sanctum.json')
    .then(r => r.json())
    .then(d => {
      const sys = d.system;
      document.getElementById('star-name').textContent = sys.star.name;
      document.getElementById('star-type').textContent = sys.star.type;
      document.getElementById('sb-title').textContent = sys.name;
      buildOrrery(sys);
      bindClicks(sys);
      renderBastions(sys.bastions);
      renderWarpAlert(sys.warp_route);
      renderFigures(sys.key_figures);
    })
    .catch(err => {
      console.error('Erreur chargement sanctum.json :', err);
      document.getElementById('orrery-svg').insertAdjacentHTML('beforeend',
        '<text x="350" y="280" text-anchor="middle" font-size="14" fill="#c43030">Erreur de chargement</text>');
    });

})();
</script>

</body>
</html>
